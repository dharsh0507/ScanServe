<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart QR Menu</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f5f5f5; color: #333; }
    nav { background: #e65c00; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; }
    nav a { color: white; text-decoration: none; font-weight: bold; margin-left: 16px; }
    nav .brand { font-size: 1.2rem; }
    .container { max-width: 900px; margin: 24px auto; padding: 0 16px; }
    h2 { margin-bottom: 16px; color: #e65c00; }
    .card { background: white; border-radius: 10px; padding: 16px; margin-bottom: 12px; box-shadow: 0 2px 6px rgba(0,0,0,0.08); display: flex; justify-content: space-between; align-items: center; }
    .card-info h3 { font-size: 1rem; }
    .card-info p { font-size: 0.85rem; color: #777; margin-top: 4px; }
    .badge { background: #fff3e0; color: #e65c00; padding: 2px 8px; border-radius: 20px; font-size: 0.75rem; margin-left: 8px; }
    .btn { background: #e65c00; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; text-decoration: none; font-size: 0.9rem; display: inline-block; }
    .btn:hover { background: #cc5200; }
    .section-title { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; color: #999; margin: 20px 0 8px; }
    table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 6px rgba(0,0,0,0.08); }
    th { background: #e65c00; color: white; padding: 10px; text-align: left; }
    td { padding: 10px; border-bottom: 1px solid #f0f0f0; }
  </style>
</head>
<body>
  <nav>
    <span class="brand">🍽️ Smart QR Menu</span>
    <div>
      <a href="/menu">Menu</a>
      <a href="/mood">😊 Mood</a>
      <a href="/voice">🎙️ Voice</a>
      <a href="/spin">🎡 Spin</a>
      <a href="/cart">🛒 Cart</a>
      <a href="/dashboard">📊 Dashboard</a>
      <a href="/generate_qr">QR Code</a>
    </div>
  </nav>
  <div class="container">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
