{% extends "base.html" %}
{% block content %}

<div style="text-align:center;padding:40px 0;">
  <h2>📱 Scan to Open Menu</h2>
  <p style="color:#777;margin:8px 0 24px;">Share this QR code at your restaurant table</p>
  <img src="data:image/png;base64,{{ qr_b64 }}" style="width:220px;height:220px;border:4px solid #e65c00;border-radius:12px;padding:8px;background:white;">
  <p style="margin-top:16px;color:#999;font-size:0.85rem;">{{ url }}</p>
  <div style="margin-top:20px;">
    <a href="{{ url }}" class="btn">Open Menu Link</a>
  </div>
</div>

{% endblock %}
